<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="데일리 플래너"/>
<title>데일리 플래너</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ececec;
  --text: #1a1a1a;
  --text2: #666666;
  --text3: #999999;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.18);
  --accent: #1a1a1a;
  --success: #2e7d32;
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --bg2: #2c2c2e;
    --bg3: #3a3a3c;
    --text: #f2f2f7;
    --text2: #aeaeb2;
    --text3: #636366;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.18);
    --accent: #f2f2f7;
    --success: #4caf50;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;max-width:520px;margin:0 auto;min-height:100vh}

.app-header{padding:16px 16px 0;padding-top:calc(16px + env(safe-area-inset-top))}
.app-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.app-sub{font-size:12px;color:var(--text3);margin-top:2px}

.tab-bar{display:flex;padding:12px 16px 0;gap:6px;border-bottom:0.5px solid var(--border);margin-top:10px}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}

.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(32px + env(safe-area-inset-bottom))}
.page{display:none}.page.active{display:block}

.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px}

textarea.field{width:100%;border:none;background:transparent;resize:none;font-size:14px;color:var(--text);line-height:1.7;outline:none;min-height:70px;font-family:inherit}

/* Week nav */
.week-nav{display:flex;align-items:center;gap:10px}
.week-nav button{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 14px;font-size:18px;cursor:pointer;color:var(--text);line-height:1;font-family:inherit}
.week-nav button:active{opacity:.6}
.week-label-big{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--text)}
.week-dates-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.week-date-cell{text-align:center;padding:5px 2px;border-radius:var(--radius-sm);background:var(--bg3)}
.wdc-day{font-size:10px;color:var(--text3);font-weight:500}
.wdc-date{font-size:13px;font-weight:600;color:var(--text);margin-top:1px}
.wdc-today .wdc-day,.wdc-today .wdc-date{color:var(--bg)}
.wdc-today{background:var(--accent)}

.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.sec:first-of-type{margin-top:0}

table.gt{width:100%;border-collapse:collapse;font-size:13px}
table.gt th{font-size:10px;font-weight:600;color:var(--text3);padding:5px 6px;border-bottom:0.5px solid var(--border2);text-align:left;text-transform:uppercase;letter-spacing:.04em}
table.gt td{padding:4px 6px;border-bottom:0.5px solid var(--border);vertical-align:middle}
table.gt tr:last-child td{border-bottom:none}
table.gt td input{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);outline:none;font-family:inherit}
table.gt td input[type=number]{width:44px;text-align:center}

.add-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);cursor:pointer;padding:6px 0;background:none;border:none;font-family:inherit;margin-top:2px}

/* Day bar */
.day-bar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-btn{padding:7px 2px 6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;color:var(--text3);text-align:center;transition:all .12s;font-family:inherit;line-height:1.2}
.day-btn .db-day{font-size:11px;font-weight:600;display:block}
.day-btn .db-date{font-size:10px;display:block;margin-top:2px;opacity:.7}
.day-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.day-btn.active .db-date{opacity:.85}
.day-btn.is-today{border-color:var(--accent);border-width:1.5px}

.daily-day-header{font-size:17px;font-weight:700;margin-bottom:12px}
.daily-day-header .dh-sub{font-size:12px;font-weight:400;color:var(--text3);display:block;margin-top:2px}

.sch-table{width:100%;border-collapse:collapse;font-size:13px}
.sch-table th{font-size:10px;font-weight:600;color:var(--text3);padding:4px 5px;border-bottom:0.5px solid var(--border2);text-align:left;text-transform:uppercase;letter-spacing:.04em}
.sch-table td{padding:3px 5px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.sch-table tr:last-child td{border-bottom:none}
.sch-table td.tm{color:var(--text3);font-size:11px;white-space:nowrap;width:36px;font-variant-numeric:tabular-nums}
.sch-table td input{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);outline:none;font-family:inherit}

.item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.item-row:last-child{border-bottom:none}
.chk{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.item-inp{flex:1;border:none;background:transparent;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.item-inp.done{text-decoration:line-through;color:var(--text3)}
.study-label{font-size:12px;color:var(--text2);min-width:60px;cursor:pointer;border-right:0.5px solid var(--border);padding-right:8px;margin-right:2px;flex-shrink:0}

.save-row{display:flex;align-items:center;gap:12px;margin-top:4px}
.save-btn{padding:9px 24px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);cursor:pointer;font-size:14px;font-weight:500;color:var(--text);font-family:inherit}
.save-btn:active{opacity:.7}
.saved-msg{font-size:12px;color:var(--success);opacity:0;transition:opacity .3s}

.backup-toggle{font-size:12px;color:var(--text3);background:none;border:0.5px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:inherit;margin-bottom:8px}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📋 데일리 플래너</div>
  <div class="app-sub" id="week-subtitle">주간 날짜를 선택해주세요</div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('weekly')">주간 계획</div>
  <div class="tab" onclick="switchTab('daily')">일일 플래너</div>
</div>

<div class="content">

  <!-- WEEKLY -->
  <div class="page active" id="page-weekly">

    <div class="card">
      <div class="card-title">주간 선택</div>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <div class="week-label-big" id="week-label-big">—</div>
        <button onclick="changeWeek(1)">›</button>
      </div>
      <div class="week-dates-row" id="week-dates-row"></div>
    </div>

    <div class="card">
      <div class="card-title">지난주 돌아보기</div>
      <div class="sec">잘 된 점</div>
      <textarea class="field" id="review-good" placeholder="지난 한 주 잘 된 점을 돌아보세요..."></textarea>
      <div class="sec">개선할 점</div>
      <textarea class="field" id="review-improve" placeholder="다음 주엔 어떻게 더 잘할 수 있을까요..."></textarea>
    </div>

    <div class="card">
      <div class="card-title">핵심 지표</div>
      <table class="gt">
        <thead><tr><th>항목</th><th style="width:50px;text-align:center">목표</th><th style="width:50px;text-align:center">실제</th></tr></thead>
        <tbody id="ki-body"></tbody>
      </table>
      <button class="add-btn" onclick="addKI()">＋ 항목 추가</button>
    </div>

    <div class="card">
      <div class="card-title">이번 주 집중해서 할 일</div>
      <table class="gt">
        <thead><tr><th>할 일</th><th>구체적 행동</th></tr></thead>
        <tbody id="focus-body"></tbody>
      </table>
      <button class="add-btn" onclick="addFocus()">＋ 추가</button>
    </div>

    <div class="card">
      <div class="card-title">기타 개인 목표</div>
      <textarea class="field" id="other-goals" placeholder="이번 주 개인 목표를 자유롭게 적어주세요..."></textarea>
    </div>

    <div class="save-row">
      <button class="save-btn" onclick="saveWeekly()">저장</button>
      <span class="saved-msg" id="weekly-saved">✓ 저장됨</span>
    </div>
  </div>

  <!-- DAILY -->
  <div class="page" id="page-daily">
    <div class="day-bar" id="day-selector"></div>
    <div class="daily-day-header" id="daily-day-header"></div>

    <div class="card">
      <div class="card-title">시간별 일정</div>
      <button class="backup-toggle" id="backup-btn" onclick="toggleBackup()">백업 플랜 보기</button>
      <table class="sch-table">
        <thead><tr><th style="width:36px">시간</th><th>플랜</th><th id="backup-th" style="display:none">백업 플랜</th></tr></thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">메모 / 노트</div>
      <textarea class="field" id="daily-memo" placeholder="오늘의 메모..."></textarea>
    </div>

    <div class="card">
      <div class="card-title">중요 일정</div>
      <textarea class="field" id="daily-important" placeholder="오늘 꼭 챙길 일정..." style="min-height:50px"></textarea>
    </div>

    <div class="card">
      <div class="card-title">오늘의 할 일</div>
      <div id="todo-list"></div>
      <button class="add-btn" onclick="addTodo()">＋ 추가</button>
    </div>

    <div class="card">
      <div class="card-title">공부 계획 / 목표</div>
      <div id="study-list"></div>
      <button class="add-btn" onclick="addStudy()">＋ 과목 추가</button>
    </div>

    <div class="save-row">
      <button class="save-btn" onclick="saveDaily()">저장</button>
      <span class="saved-msg" id="daily-saved">✓ 저장됨</span>
    </div>
  </div>

</div>

<script>
const DAYS_KO = ['월','화','수','목','금','토','일'];
const TIMES = ['6:00','6:30','7:00','7:30','8:00','8:30','9:00','9:30','10:00','10:30','11:00','11:30','12:00','12:30','1:00','1:30','2:00','2:30','3:00','3:30','4:00','4:30','5:00','5:30','6:00','6:30','7:00','7:30','8:00','8:30','9:00'];

let currentDay = 0;
let backupVisible = false;
let weekMonday = getThisWeekMonday();
let data = { weekly: {}, daily: {} };

function getThisWeekMonday() {
  const d = new Date(); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return d;
}
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function dateKey(date) { return date.toISOString().slice(0,10); }
function weekKey(mon) { return dateKey(mon); }
function getWeekDates(mon) { return Array.from({length:7},(_,i)=>addDays(mon,i)); }

function formatFull(date) {
  const dn = ['일','월','화','수','목','금','토'];
  return (date.getMonth()+1)+'월 '+date.getDate()+'일 ('+dn[date.getDay()]+')';
}

// --- Week ---
function changeWeek(dir) {
  weekMonday = addDays(weekMonday, dir*7);
  renderWeekHeader();
  updateDayBar();
  updateDailyHeader();
}

function renderWeekHeader() {
  const dates = getWeekDates(weekMonday);
  const sun = dates[6];
  const label = (weekMonday.getMonth()+1)+'월 '+weekMonday.getDate()+'일 ~ '+(sun.getMonth()+1)+'월 '+sun.getDate()+'일';
  document.getElementById('week-label-big').textContent = label;
  document.getElementById('week-subtitle').textContent = label;

  const row = document.getElementById('week-dates-row');
  row.innerHTML = '';
  const todayStr = dateKey(new Date());
  dates.forEach((d,i) => {
    const dk = dateKey(d);
    const cell = document.createElement('div');
    cell.className = 'week-date-cell' + (dk===todayStr?' wdc-today':'');
    cell.innerHTML = `<div class="wdc-day">${DAYS_KO[i]}</div><div class="wdc-date">${d.getDate()}</div>`;
    row.appendChild(cell);
  });

  loadWeeklyData(weekKey(weekMonday));
}

function loadWeeklyData(wk) {
  const wd = data.weekly[wk] || {};
  document.getElementById('review-good').value = wd.review_good||'';
  document.getElementById('review-improve').value = wd.review_improve||'';
  document.getElementById('other-goals').value = wd.other||'';
  document.getElementById('ki-body').innerHTML = '';
  document.getElementById('focus-body').innerHTML = '';
  (wd.ki||[]).forEach(k=>addKI(k.label,k.goal,k.actual));
  (wd.focus||[]).forEach(f=>addFocus(f.task,f.action));
  if(!(wd.ki&&wd.ki.length)){addKI();addKI();addKI();}
  if(!(wd.focus&&wd.focus.length)){addFocus();addFocus();addFocus();}
}

// --- Tab ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['weekly','daily'][i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
}

// --- KI & Focus ---
function addKI(label='',goal='',actual=''){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" value="${label}" placeholder="항목명" oninput="syncKI()"/></td>
    <td style="text-align:center"><input type="number" value="${goal}" placeholder="0" oninput="syncKI()"/></td>
    <td style="text-align:center"><input type="number" value="${actual}" placeholder="0" oninput="syncKI()"/></td>`;
  document.getElementById('ki-body').appendChild(tr);
}
function syncKI(){
  const wk=weekKey(weekMonday);
  if(!data.weekly[wk])data.weekly[wk]={};
  data.weekly[wk].ki=Array.from(document.querySelectorAll('#ki-body tr')).map(r=>{
    const ins=r.querySelectorAll('input');return{label:ins[0].value,goal:ins[1].value,actual:ins[2].value};
  });
}
function addFocus(task='',action=''){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" value="${task}" placeholder="집중할 일" oninput="syncFocus()"/></td>
    <td><input type="text" value="${action}" placeholder="구체적 행동" oninput="syncFocus()"/></td>`;
  document.getElementById('focus-body').appendChild(tr);
}
function syncFocus(){
  const wk=weekKey(weekMonday);
  if(!data.weekly[wk])data.weekly[wk]={};
  data.weekly[wk].focus=Array.from(document.querySelectorAll('#focus-body tr')).map(r=>{
    const ins=r.querySelectorAll('input');return{task:ins[0].value,action:ins[1].value};
  });
}

// --- Day bar ---
function updateDayBar() {
  const c=document.getElementById('day-selector');
  c.innerHTML='';
  const dates=getWeekDates(weekMonday);
  const todayStr=dateKey(new Date());
  dates.forEach((d,i)=>{
    const b=document.createElement('button');
    const dk=dateKey(d);
    let cls='day-btn';
    if(i===currentDay) cls+=' active';
    if(dk===todayStr) cls+=' is-today';
    b.className=cls;
    b.innerHTML=`<span class="db-day">${DAYS_KO[i]}</span><span class="db-date">${d.getDate()}</span>`;
    b.onclick=()=>selectDay(i);
    c.appendChild(b);
  });
}

function updateDailyHeader() {
  const dates=getWeekDates(weekMonday);
  const d=dates[currentDay];
  const el=document.getElementById('daily-day-header');
  el.innerHTML=DAYS_KO[currentDay]+'요일<span class="dh-sub">'+formatFull(d)+'</span>';
}

function currentDateKey(){return dateKey(getWeekDates(weekMonday)[currentDay]);}
function currentDayData(){
  const dk=currentDateKey();
  if(!data.daily[dk])data.daily[dk]={schedule:TIMES.map(()=>({plan:'',backup:''})),memo:'',important:'',todos:[],studies:[]};
  return data.daily[dk];
}

function selectDay(i){
  currentDay=i;
  updateDayBar();
  updateDailyHeader();
  const d=currentDayData();
  renderSchedule();
  document.getElementById('daily-memo').value=d.memo||'';
  document.getElementById('daily-important').value=d.important||'';
  renderTodos();
  renderStudies();
}

// --- Schedule ---
function toggleBackup(){
  backupVisible=!backupVisible;
  document.getElementById('backup-th').style.display=backupVisible?'':'none';
  document.querySelectorAll('.sch-table td:nth-child(3)').forEach(td=>td.style.display=backupVisible?'':'none');
  document.getElementById('backup-btn').textContent=backupVisible?'백업 플랜 숨기기':'백업 플랜 보기';
}
function renderSchedule(){
  const d=currentDayData();
  const tbody=document.getElementById('schedule-body');
  tbody.innerHTML='';
  TIMES.forEach((t,i)=>{
    if(!d.schedule[i])d.schedule[i]={plan:'',backup:''};
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="tm">${t}</td>
      <td><input type="text" value="${d.schedule[i].plan}" oninput="currentDayData().schedule[${i}].plan=this.value"/></td>
      <td style="display:${backupVisible?'':'none'}"><input type="text" value="${d.schedule[i].backup}" oninput="currentDayData().schedule[${i}].backup=this.value"/></td>`;
    tbody.appendChild(tr);
  });
}

// --- Todos ---
function renderTodos(){
  const d=currentDayData();
  const c=document.getElementById('todo-list');
  c.innerHTML='';
  (d.todos||[]).forEach((todo,i)=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<input type="checkbox" class="chk" ${todo.done?'checked':''} onchange="toggleTodo(${i})"/>
      <input class="item-inp${todo.done?' done':''}" type="text" value="${todo.text||''}" placeholder="할 일 입력..." oninput="currentDayData().todos[${i}].text=this.value"/>`;
    c.appendChild(row);
  });
}
function addTodo(){currentDayData().todos.push({text:'',done:false});renderTodos();const ins=document.querySelectorAll('#todo-list .item-inp');if(ins.length)ins[ins.length-1].focus();}
function toggleTodo(i){currentDayData().todos[i].done=!currentDayData().todos[i].done;renderTodos();}

// --- Studies ---
function renderStudies(){
  const d=currentDayData();
  const c=document.getElementById('study-list');
  c.innerHTML='';
  (d.studies||[]).forEach((s,i)=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<span class="study-label" onclick="renameStudy(${i})">${s.subject||'과목'}</span>
      <input class="item-inp" type="text" value="${s.goal||''}" placeholder="오늘의 목표..." oninput="currentDayData().studies[${i}].goal=this.value"/>`;
    c.appendChild(row);
  });
}
function addStudy(){
  const subj=prompt('과목/분야 이름\n(예: 수학, 영어, SwiftUI)');
  if(subj===null)return;
  currentDayData().studies.push({subject:subj||'과목',goal:''});
  renderStudies();
  const ins=document.querySelectorAll('#study-list .item-inp');if(ins.length)ins[ins.length-1].focus();
}
function renameStudy(i){
  const cur=currentDayData().studies[i].subject;
  const n=prompt('과목/분야 이름 변경',cur);
  if(n!==null){currentDayData().studies[i].subject=n||cur;renderStudies();}
}

// --- Textarea live sync ---
document.getElementById('daily-memo').addEventListener('input',e=>{currentDayData().memo=e.target.value;});
document.getElementById('daily-important').addEventListener('input',e=>{currentDayData().important=e.target.value;});
document.getElementById('review-good').addEventListener('input',e=>{const wk=weekKey(weekMonday);if(!data.weekly[wk])data.weekly[wk]={};data.weekly[wk].review_good=e.target.value;});
document.getElementById('review-improve').addEventListener('input',e=>{const wk=weekKey(weekMonday);if(!data.weekly[wk])data.weekly[wk]={};data.weekly[wk].review_improve=e.target.value;});
document.getElementById('other-goals').addEventListener('input',e=>{const wk=weekKey(weekMonday);if(!data.weekly[wk])data.weekly[wk]={};data.weekly[wk].other=e.target.value;});

// --- Save / Load ---
function flash(id){const el=document.getElementById(id);el.style.opacity=1;setTimeout(()=>el.style.opacity=0,2000);}

function saveWeekly(){
  syncKI();syncFocus();
  const wk=weekKey(weekMonday);
  if(!data.weekly[wk])data.weekly[wk]={};
  data.weekly[wk].review_good=document.getElementById('review-good').value;
  data.weekly[wk].review_improve=document.getElementById('review-improve').value;
  data.weekly[wk].other=document.getElementById('other-goals').value;
  try{localStorage.setItem('planner_weekly',JSON.stringify(data.weekly));}catch(e){}
  flash('weekly-saved');
}
function saveDaily(){
  currentDayData().memo=document.getElementById('daily-memo').value;
  currentDayData().important=document.getElementById('daily-important').value;
  try{localStorage.setItem('planner_daily',JSON.stringify(data.daily));}catch(e){}
  flash('daily-saved');
}
function loadSaved(){
  try{
    const w=localStorage.getItem('planner_weekly');if(w)data.weekly=JSON.parse(w);
    const d=localStorage.getItem('planner_daily');if(d)data.daily=JSON.parse(d);
  }catch(e){}
}

// --- Init ---
loadSaved();
renderWeekHeader();
updateDayBar();
updateDailyHeader();
selectDay(0);
</script>
